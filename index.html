<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ARTEFACT</title>
<style>
  :root{
    --noir:#000000;
    --rouge:#ff1f10;
    --texte:rgba(255,235,232,0.82);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;width:100%;overflow:hidden;background:var(--noir);}
  body{
    font-family: ui-monospace, "SF Mono", "Menlo", "Roboto Mono", monospace;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  #scene{position:fixed;inset:0;display:block;background:#000;}
  /* ---- couche interface, volontairement minimale : l'agent domine ---- */
  .ui{position:fixed;inset:0;pointer-events:none;z-index:2;
      display:flex;flex-direction:column;align-items:center;justify-content:space-between;
      padding: max(28px, env(safe-area-inset-top)) 20px max(34px, env(safe-area-inset-bottom));}
  .wordmark{
    color:var(--texte);
    font-size:13px;
    font-weight:400;
    letter-spacing:0.62em;
    text-indent:0.62em;
    opacity:0;
    text-transform:uppercase;
    animation: fadeIn 2.4s ease 0.4s forwards;
    text-shadow:0 0 18px rgba(255,40,25,0.25);
  }
  .hint{
    color:var(--texte);
    font-size:11px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    opacity:0;
    text-align:center;
    animation: fadeIn 2.4s ease 1.1s forwards, breathe 4.6s ease-in-out 3s infinite;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:0.55;transform:translateY(0);}}
  @keyframes breathe{0%,100%{opacity:0.32;}50%{opacity:0.7;}}
  /* repli si WebGL indisponible */
  .fallback{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#000;z-index:1;}
  .fallback .orb{width:42vmin;height:42vmin;border-radius:50%;
    background:radial-gradient(circle at 50% 58%, #ff3a1e 0%, #c00f06 32%, #3a0301 64%, #050000 100%);
    box-shadow:0 0 90px 20px rgba(255,30,12,0.35);
    animation: pulse 4.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.035);}}
  @media (prefers-reduced-motion: reduce){
    .hint{animation: fadeIn 0.6s ease 1.1s forwards;}
    .fallback .orb{animation:none;}
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="fallback"><div class="orb"></div></div>
  <div class="ui">
    <div class="wordmark">ARTEFACT</div>
  </div>

<script id="vert" type="x-shader/x-vertex">
attribute vec2 aPos;
void main(){ gl_Position = vec4(aPos, 0.0, 1.0); }
</script>

<script id="frag" type="x-shader/x-fragment">
precision highp float;
uniform vec2  uRes;
uniform float uTime;
uniform float uAbsorb;   // 0..1 montée/descente douce au toucher
uniform float uReduced;  // 1 si l'utilisateur réduit les animations

float hash(vec2 p){
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
float vnoise(vec2 p){
  vec2 i = floor(p); vec2 f = fract(p);
  f = f*f*(3.0-2.0*f);
  float a = hash(i);
  float b = hash(i + vec2(1.0,0.0));
  float c = hash(i + vec2(0.0,1.0));
  float d = hash(i + vec2(1.0,1.0));
  return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
}
float fbm(vec2 p){
  float s = 0.0; float a = 0.5;
  for(int i=0;i<5;i++){ s += a*vnoise(p); p *= 2.02; a *= 0.5; }
  return s;
}

void main(){
  vec2 frag = (gl_FragCoord.xy - 0.5*uRes) / min(uRes.x, uRes.y);

  float reduced = step(0.5, uReduced);
  // respiration de la masse
  float breath = (1.0 - reduced) * sin(uTime*0.7) * 0.012;
  float contract = uAbsorb * -0.018;        // inspiration brève quand on dépose
  float R = 0.325 + breath + contract;

  float r = length(frag);
  float z = sqrt(max(0.0, R*R - r*r));
  float edge = 0.0065;
  float mask = smoothstep(R+edge, R-edge, r);

  // coordonnées "sphériques" : compression vers le bord pour l'effet enveloppant
  float zz = max(z/R, 0.06);
  vec2 suv = vec2(frag.x / zz, frag.y);

  // écoulement des filaments vers le haut
  float speed = (0.16 + uAbsorb*0.55) * mix(1.0, 0.25, reduced);
  float t = uTime * speed;

  float s1 = fbm(vec2(suv.x*14.0, suv.y*5.0 - t*3.0));
  float s2 = fbm(vec2(suv.x*30.0, suv.y*9.0 - t*5.0));
  float fil = s1*0.65 + s2*0.45;

  // grain fibreux fin
  float grain = vnoise(vec2(suv.x*120.0, suv.y*60.0 - t*8.0));
  fil += (grain - 0.5) * 0.18;

  // halo de bord (fresnel) + biais vers le sommet (liseré plus clair)
  float fres = pow(1.0 - z/R, 2.2);
  float topbias = smoothstep(-0.12, 0.5, frag.y);

  // TOUTE la sphère est rouge : base élevée et homogène, modulée par les filets
  float base = 0.92;
  vec2 core = frag - vec2(0.0, -0.05);
  float lift = smoothstep(R*1.1, 0.0, length(core)) * 0.16;   // foyer très doux bas-centre
  float topRim = fres * topbias * 0.22;                       // liseré fibreux en haut

  float intensity = base + (fil - 0.5) * 0.6 + lift + topRim;
  intensity *= (1.0 + uAbsorb*0.6);                           // absorption au toucher

  // rampe : du rouge sombre au rouge incandescent — jamais de noir à l'intérieur
  vec3 redDark   = vec3(0.34, 0.018, 0.012);
  vec3 redBase   = vec3(0.80, 0.055, 0.038);
  vec3 redBright = vec3(1.0,  0.24,  0.14);
  vec3 col = mix(redDark, redBase, smoothstep(0.42, 0.95, intensity));
  col = mix(col, redBright, smoothstep(1.0, 1.45, intensity));

  // arrondi : bord à peine plus sombre, sans jamais virer au noir
  col *= mix(0.80, 1.0, z/R);
  col *= mask;

  // halo extérieur dans le noir
  float halo = exp(-max(0.0, r-R)*9.0)*0.5 + exp(-max(0.0, r-R)*22.0)*0.4;
  col += vec3(0.5,0.03,0.02) * halo * (1.0-mask) * (1.0 + uAbsorb*0.6);

  // vignette très sombre
  float vig = smoothstep(1.15, 0.2, r);
  col += vec3(0.012,0.004,0.006) * vig * (1.0-mask) * (1.0-halo);

  col = pow(col, vec3(0.95));
  gl_FragColor = vec4(col, 1.0);
}
</script>

<script>
(function(){
  const canvas = document.getElementById('scene');
  const fallback = document.querySelector('.fallback');
  let gl = canvas.getContext('webgl', {antialias:true, alpha:false, premultipliedAlpha:false})
        || canvas.getContext('experimental-webgl');

  if(!gl){ canvas.style.display='none'; fallback.style.display='flex'; return; }

  function compile(type, src){
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if(!gl.getShaderParameter(sh, gl.COMPILE_STATUS)){
      console.error(gl.getShaderInfoLog(sh)); return null;
    }
    return sh;
  }
  const vs = compile(gl.VERTEX_SHADER, document.getElementById('vert').textContent);
  const fs = compile(gl.FRAGMENT_SHADER, document.getElementById('frag').textContent);
  if(!vs || !fs){ canvas.style.display='none'; fallback.style.display='flex'; return; }

  const prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog, gl.LINK_STATUS)){
    canvas.style.display='none'; fallback.style.display='flex'; return;
  }
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'aPos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const uRes     = gl.getUniformLocation(prog, 'uRes');
  const uTime    = gl.getUniformLocation(prog, 'uTime');
  const uAbsorb  = gl.getUniformLocation(prog, 'uAbsorb');
  const uReduced = gl.getUniformLocation(prog, 'uReduced');

  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 1.0 : 0.0;
  gl.uniform1f(uReduced, reduced);

  let DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize(){
    const w = window.innerWidth, h = window.innerHeight;
    canvas.style.width = w+'px'; canvas.style.height = h+'px';
    canvas.width = Math.round(w*DPR); canvas.height = Math.round(h*DPR);
    gl.viewport(0,0,canvas.width,canvas.height);
    gl.uniform2f(uRes, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize, {passive:true});
  resize();

  // interaction : l'agent inspire quand on le touche
  let absorb = 0, target = 0;
  function press(){ target = 1; }
  function release(){ target = 0; }
  canvas.addEventListener('pointerdown', press);
  window.addEventListener('pointerup', release);
  window.addEventListener('pointercancel', release);

  let start = performance.now(), running = true;
  function frame(now){
    if(!running) return;
    const t = (now - start) / 1000;
    absorb += (target - absorb) * 0.08;   // lissage doux -> jamais brusque
    gl.uniform1f(uTime, t);
    gl.uniform1f(uAbsorb, absorb);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // on met l'animation en pause hors écran -> batterie + fluidité
  document.addEventListener('visibilitychange', ()=>{
    if(document.hidden){ running = false; }
    else if(!running){ running = true; start = performance.now() - 0; requestAnimationFrame(frame); }
  });
})();
</script>
</body>
</html>
