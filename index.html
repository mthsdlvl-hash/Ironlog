<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#000;font-family:'DM Sans',sans-serif;overflow:hidden;}

  .app{
    width:100vw;height:100vh;
    background:#000000;
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
  }

  /* ── Lueur ambiante noire ── */
  .glow{
    position:absolute;width:360px;height:360px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,0.04) 0%,transparent 70%);
    animation:glowPulse 5s ease-in-out infinite;pointer-events:none;
    transition:opacity 0.6s;
  }
  .menu-open .glow{opacity:0.2;}
  @keyframes glowPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}

  /* ── Anneaux ── */
  .rings{position:absolute;pointer-events:none;transition:opacity 0.4s;}
  .menu-open .rings{opacity:0;}
  .ring{
    position:absolute;border-radius:50%;
    border:0.5px solid rgba(255,255,255,0.06);
    animation:ringOut 5s ease-out infinite;
    top:50%;left:50%;transform:translate(-50%,-50%);
  }
  .ring:nth-child(1){width:260px;height:260px;animation-delay:0s;}
  .ring:nth-child(2){width:330px;height:330px;animation-delay:1.6s;}
  .ring:nth-child(3){width:410px;height:410px;animation-delay:3.2s;}
  @keyframes ringOut{
    0%{opacity:0;transform:translate(-50%,-50%) scale(0.88);}
    20%{opacity:1;}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1.12);}
  }

  /* ── Sphère ── */
  .sphere-wrap{
    position:absolute;
    left:50%;top:50%;
    transform:translate(-50%,-50%);
    width:200px;height:200px;
    cursor:pointer;z-index:20;
    transition:left 0.65s cubic-bezier(0.77,0,0.18,1),
               top 0.65s cubic-bezier(0.77,0,0.18,1),
               transform 0.65s cubic-bezier(0.77,0,0.18,1);
  }
  .menu-open .sphere-wrap{
    left:22%;top:50%;
    transform:translate(-50%,-50%) scale(0.78);
  }
  canvas#c{
    display:block;width:200px;height:200px;border-radius:50%;
  }

  /* ── Status ── */
  .status{
    position:absolute;bottom:40px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:7px;
    font-size:10px;letter-spacing:0.22em;color:rgba(255,255,255,0.18);
    text-transform:uppercase;white-space:nowrap;user-select:none;
    transition:opacity 0.4s;
  }
  .menu-open .status{opacity:0;pointer-events:none;}
  .dot{width:5px;height:5px;border-radius:50%;background:rgba(180,255,200,0.6);animation:blink 2.5s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.1;}}

  /* ── Hint ── */
  .hint{
    position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
    font-size:10px;color:rgba(255,255,255,0.1);letter-spacing:0.14em;
    animation:hintFloat 3.5s ease-in-out infinite;pointer-events:none;
    transition:opacity 0.4s;
  }
  .menu-open .hint{opacity:0;}
  @keyframes hintFloat{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-5px);}}

  /* ══════════════════════════════════════
     ARC MENU
  ══════════════════════════════════════ */
  .arc-canvas{
    position:absolute;inset:0;width:100%;height:100%;
    pointer-events:none;z-index:9;
    opacity:0;transition:opacity 0.5s;
  }
  .menu-open .arc-canvas{opacity:1;}

  .menu-item{
    position:absolute;
    display:flex;align-items:center;gap:14px;
    cursor:pointer;opacity:0;
    transform:scale(0.85) translateX(10px);
    transition:opacity 0.35s,transform 0.38s cubic-bezier(0.34,1.4,0.64,1);
    z-index:30;user-select:none;pointer-events:none;
  }
  .menu-open .menu-item{opacity:1;transform:scale(1) translateX(0);pointer-events:auto;}
  .menu-open .menu-item:nth-child(1){transition-delay:0.04s;}
  .menu-open .menu-item:nth-child(2){transition-delay:0.10s;}
  .menu-open .menu-item:nth-child(3){transition-delay:0.16s;}
  .menu-open .menu-item:nth-child(4){transition-delay:0.22s;}

  .item-label{
    font-size:19px;font-weight:300;
    color:rgba(255,255,255,0.22);
    letter-spacing:-0.01em;
    transition:color 0.25s;white-space:nowrap;
  }
  .menu-item.active .item-label,
  .menu-item.hovered .item-label{color:rgba(255,255,255,0.85);font-weight:400;}

  .item-icon{
    width:54px;height:54px;border-radius:50%;
    background:rgba(255,255,255,0.05);
    display:flex;align-items:center;justify-content:center;
    font-size:24px;flex-shrink:0;position:relative;
    transition:transform 0.3s,background 0.3s;
  }
  .menu-item.active .item-icon,
  .menu-item.hovered .item-icon{
    background:rgba(255,255,255,0.09);transform:scale(1.1);
  }

  /* Contour blanc néon tournant sur item actif */
  .menu-item.active .item-icon::before{
    content:'';position:absolute;inset:-2.5px;border-radius:50%;
    background:conic-gradient(from 0deg,
      rgba(255,255,255,0.9),rgba(255,255,255,0.2),
      rgba(255,255,255,0.9),rgba(255,255,255,0.1),
      rgba(255,255,255,0.9)
    );
    -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
    mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    animation:spinBorder 2.5s linear infinite;
  }
  @keyframes spinBorder{to{transform:rotate(360deg);}}

  .active-pill{
    display:none;width:30px;height:14px;border-radius:20px;
    background:rgba(255,255,255,0.75);flex-shrink:0;
  }
  .menu-item.active .active-pill{display:block;}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="glow"></div>
  <div class="rings">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
  </div>

  <canvas class="arc-canvas" id="arcCanvas"></canvas>

  <div class="menu-item" data-index="0" id="item0">
    <span class="item-label">Habitudes</span>
    <div class="item-icon">🌱</div>
    <div class="active-pill"></div>
  </div>
  <div class="menu-item" data-index="1" id="item1">
    <span class="item-label">Sommeil</span>
    <div class="item-icon">🌙</div>
    <div class="active-pill"></div>
  </div>
  <div class="menu-item" data-index="2" id="item2">
    <span class="item-label">Sport</span>
    <div class="item-icon">⚡</div>
    <div class="active-pill"></div>
  </div>
  <div class="menu-item" data-index="3" id="item3">
    <span class="item-label">Réflexion</span>
    <div class="item-icon">✦</div>
    <div class="active-pill"></div>
  </div>

  <div class="sphere-wrap" id="wrap">
    <canvas id="c" width="480" height="480"></canvas>
  </div>

  <div class="hint">appuie pour explorer</div>
  <div class="status"><div class="dot"></div>Agent actif</div>
</div>

<script>
/* ══════════════════════════════════════
   SPHERE — blanc sur noir, effet neon animé
══════════════════════════════════════ */
const SC   = document.getElementById('c');
const sctx = SC.getContext('2d');
const SW=480,SH=480,SCX=SW/2,SCY=SH/2,SR=175;

let t = 0;

// Légère ondulation de surface — amplitude très faible, forme reste ronde
const waves=[
  {freq:2,amp:4,speed:0.22,phase:0.0},
  {freq:3,amp:3,speed:0.15,phase:1.4},
  {freq:5,amp:2,speed:0.30,phase:2.7},
  {freq:7,amp:1.5,speed:0.18,phase:0.9},
];

function getR(a,time){
  let r=SR;
  for(const w of waves) r+=Math.sin(a*w.freq+w.phase+time*w.speed)*w.amp;
  return r;
}

function buildPath(time){
  sctx.beginPath();
  const steps=300;
  for(let i=0;i<=steps;i++){
    const a=(i/steps)*Math.PI*2;
    const r=getR(a,time);
    const x=SCX+Math.cos(a)*r, y=SCY+Math.sin(a)*r;
    i===0?sctx.moveTo(x,y):sctx.lineTo(x,y);
  }
  sctx.closePath();
}

// Point lumineux qui tourne lentement sur la surface → simule un éclairage orbital
function drawSphere(){
  t += 0.007;
  sctx.clearRect(0,0,SW,SH);

  sctx.save();
  buildPath(t);
  sctx.clip();

  // ── Corps principal : sphère blanche texturée ──
  // Lumière orbitale : source qui tourne autour de la sphère
  const lx = SCX + Math.cos(t*0.35) * SR * 0.55;
  const ly = SCY + Math.sin(t*0.35) * SR * 0.42;

  // Gradient de base : gris foncé au centre → blanc sur les bords éclairés
  const base = sctx.createRadialGradient(lx, ly, 0, SCX, SCY, SR+10);
  base.addColorStop(0.0,  'rgba(255,255,255,1.0)');  // point le plus éclairé
  base.addColorStop(0.18, 'rgba(230,230,230,0.98)');
  base.addColorStop(0.42, 'rgba(160,160,160,0.95)');
  base.addColorStop(0.70, 'rgba(70,70,70,0.97)');
  base.addColorStop(0.88, 'rgba(25,25,25,0.98)');
  base.addColorStop(1.0,  'rgba(8,8,8,1.0)');
  sctx.fillStyle = base;
  sctx.fillRect(0,0,SW,SH);

  // ── Texture de grain fin sur la surface ──
  // Simulée via un gradient radial bruit-like avec second point lumineux
  const grain = sctx.createRadialGradient(
    SCX + Math.sin(t*0.6)*30, SCY + Math.cos(t*0.45)*25, SR*0.3,
    SCX, SCY, SR
  );
  grain.addColorStop(0.0, 'rgba(255,255,255,0.06)');
  grain.addColorStop(0.5, 'rgba(200,200,200,0.03)');
  grain.addColorStop(1.0, 'rgba(0,0,0,0.12)');
  sctx.fillStyle = grain;
  sctx.fillRect(0,0,SW,SH);

  // ── Halo néon blanc animé sur le bord ──
  // Intensité qui pulse doucement
  const neonAmp = 0.55 + Math.sin(t*1.1)*0.20 + Math.sin(t*0.7)*0.12;
  const neon = sctx.createRadialGradient(SCX,SCY,SR*0.72, SCX,SCY,SR+6);
  neon.addColorStop(0.0, 'rgba(255,255,255,0)');
  neon.addColorStop(0.7, `rgba(255,255,255,${0.08*neonAmp})`);
  neon.addColorStop(0.88,`rgba(255,255,255,${0.55*neonAmp})`);
  neon.addColorStop(0.96,`rgba(255,255,255,${0.80*neonAmp})`);
  neon.addColorStop(1.0, `rgba(255,255,255,${0.30*neonAmp})`);
  sctx.fillStyle = neon;
  sctx.fillRect(0,0,SW,SH);

  // ── Second arc néon décalé (côté opposé) ──
  const lx2 = SCX - Math.cos(t*0.35) * SR * 0.7;
  const ly2 = SCY - Math.sin(t*0.35) * SR * 0.55;
  const neon2 = sctx.createRadialGradient(lx2,ly2,SR*0.5, lx2,ly2,SR*1.1);
  neon2.addColorStop(0.0,'rgba(255,255,255,0)');
  neon2.addColorStop(0.7,`rgba(255,255,255,${0.04*neonAmp})`);
  neon2.addColorStop(1.0,`rgba(255,255,255,${0.18*neonAmp})`);
  sctx.fillStyle = neon2;
  sctx.fillRect(0,0,SW,SH);

  // ── Coeur sombre (profondeur) ──
  const core = sctx.createRadialGradient(SCX,SCY,0,SCX,SCY,SR*0.65);
  core.addColorStop(0.0,'rgba(0,0,0,0.45)');
  core.addColorStop(1.0,'rgba(0,0,0,0)');
  sctx.fillStyle = core;
  sctx.fillRect(0,0,SW,SH);

  sctx.restore();

  // ── Contour extérieur néon blanc (hors clip) ──
  buildPath(t);
  const neonAmp2 = 0.5 + Math.sin(t*1.1+1)*0.25;
  sctx.shadowColor = `rgba(255,255,255,${0.55*neonAmp2})`;
  sctx.shadowBlur  = 18 + Math.sin(t*0.9)*8;
  sctx.strokeStyle = `rgba(255,255,255,${0.55*neonAmp2})`;
  sctx.lineWidth   = 1.2;
  sctx.stroke();
  sctx.shadowBlur  = 0;

  requestAnimationFrame(drawSphere);
}
drawSphere();

/* ══════════════════════════════════════
   ARC MENU
══════════════════════════════════════ */
const app     = document.getElementById('app');
const wrap    = document.getElementById('wrap');
const arcCv   = document.getElementById('arcCanvas');
const actx    = arcCv.getContext('2d');
const itemEls = document.querySelectorAll('.menu-item');

let menuOpen=false, activeIdx=-1, hoveredIdx=-1;
let rayTarget=-1, rayProgress=0, pulseT=0;

const ARC_START = -52*Math.PI/180;
const ARC_END   =  52*Math.PI/180;

function getItemAngle(i){ return ARC_START+(ARC_END-ARC_START)*(i/(itemEls.length-1)); }

function getSphereCenter(){
  if(!menuOpen) return {x:window.innerWidth/2, y:window.innerHeight/2};
  return {x:window.innerWidth*0.22, y:window.innerHeight*0.50};
}

function positionItems(){
  const sc  = getSphereCenter();
  const arcR= Math.min(window.innerWidth,window.innerHeight)*0.42;
  itemEls.forEach((el,i)=>{
    const angle=getItemAngle(i);
    const ix=sc.x+Math.cos(angle)*arcR;
    const iy=sc.y+Math.sin(angle)*arcR;
    el.style.left=(ix-54/2-130-14)+'px';
    el.style.top =(iy-27)+'px';
    el.style.width=(130+14+54)+'px';
  });
}

function resize(){ arcCv.width=window.innerWidth; arcCv.height=window.innerHeight; positionItems(); }

function drawRay(sc, targetEl, progress){
  const iconEl=targetEl.querySelector('.item-icon');
  const ir=iconEl.getBoundingClientRect();
  const tx=ir.left+ir.width/2, ty=ir.top+ir.height/2;
  const dx=tx-sc.x, dy=ty-sc.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const sphereR=200/2*0.78*0.9;
  const nx=dx/dist, ny=dy/dist;
  const sx=sc.x+nx*sphereR, sy=sc.y+ny*sphereR;
  const ex=sx+dx*progress, ey=sy+dy*progress;

  actx.save();
  // Rayon blanc néon
  const grad=actx.createLinearGradient(sx,sy,ex,ey);
  grad.addColorStop(0.0,'rgba(255,255,255,0)');
  grad.addColorStop(0.1,'rgba(255,255,255,0.6)');
  grad.addColorStop(0.7,'rgba(255,255,255,0.35)');
  grad.addColorStop(1.0,'rgba(255,255,255,0)');
  actx.beginPath();actx.moveTo(sx,sy);actx.lineTo(ex,ey);
  actx.strokeStyle=grad;actx.lineWidth=1;
  actx.shadowColor='rgba(255,255,255,0.5)';actx.shadowBlur=8;
  actx.stroke();
  // Lueur terminale
  if(progress>0.82){
    const alpha=(progress-0.82)/0.18;
    const g2=actx.createRadialGradient(ex,ey,0,ex,ey,16);
    g2.addColorStop(0,`rgba(255,255,255,${0.4*alpha})`);
    g2.addColorStop(1,'rgba(0,0,0,0)');
    actx.fillStyle=g2;actx.beginPath();actx.arc(ex,ey,16,0,Math.PI*2);actx.fill();
  }
  actx.restore();
}

function drawArcLine(sc){
  const arcR=Math.min(window.innerWidth,window.innerHeight)*0.42;
  actx.save();
  actx.beginPath();
  actx.arc(sc.x,sc.y,arcR,ARC_START-0.06,ARC_END+0.06);
  actx.strokeStyle='rgba(255,255,255,0.07)';
  actx.lineWidth=0.8;actx.setLineDash([3,9]);actx.stroke();actx.setLineDash([]);
  actx.restore();
}

function arcLoop(){
  requestAnimationFrame(arcLoop);
  actx.clearRect(0,0,arcCv.width,arcCv.height);
  if(!menuOpen) return;
  pulseT+=0.04;
  const sc=getSphereCenter();
  drawArcLine(sc);
  const ti=hoveredIdx>=0?hoveredIdx:activeIdx;
  if(ti>=0){
    if(rayTarget!==ti){rayTarget=ti;rayProgress=0;}
    if(rayProgress<1) rayProgress=Math.min(1,rayProgress+0.07);
    drawRay(sc,itemEls[rayTarget],rayProgress);
  } else {rayTarget=-1;rayProgress=0;}
}
arcLoop();

function openMenu(){if(menuOpen)return;menuOpen=true;app.classList.add('menu-open');setTimeout(positionItems,50);}
function closeMenu(){if(!menuOpen)return;menuOpen=false;hoveredIdx=-1;app.classList.remove('menu-open');}

wrap.addEventListener('click',()=>{menuOpen?closeMenu():openMenu();});

itemEls.forEach((el,i)=>{
  el.addEventListener('mouseenter',()=>{hoveredIdx=i;el.classList.add('hovered');});
  el.addEventListener('mouseleave',()=>{hoveredIdx=-1;el.classList.remove('hovered');});
  el.addEventListener('click',(e)=>{
    e.stopPropagation();
    itemEls.forEach(it=>it.classList.remove('active'));
    activeIdx=(activeIdx===i)?-1:i;
    if(activeIdx>=0)el.classList.add('active');
    setTimeout(closeMenu,380);
  });
  el.addEventListener('touchend',(e)=>{
    e.stopPropagation();
    itemEls.forEach(it=>it.classList.remove('active'));
    activeIdx=(activeIdx===i)?-1:i;
    if(activeIdx>=0)el.classList.add('active');
    hoveredIdx=-1;setTimeout(closeMenu,380);
  });
});

app.addEventListener('click',(e)=>{
  if(menuOpen&&!wrap.contains(e.target)&&![...itemEls].some(el=>el.contains(e.target))) closeMenu();
});
window.addEventListener('resize',resize);
resize();
</script>
</body>
</html>
