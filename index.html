<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #f0f0f0;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  .app {
    width: 100vw;
    height: 100vh;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* ── Lueur ambiante ── */
  .glow {
    position: absolute;
    width: 380px; height: 380px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(160,180,255,0.07) 0%,
      rgba(180,220,255,0.04) 50%,
      transparent 75%
    );
    animation: glowPulse 5s ease-in-out infinite;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  .menu-open .glow { opacity: 0.3; }
  @keyframes glowPulse {
    0%,100% { transform: scale(1); opacity: 0.7; }
    50%     { transform: scale(1.12); opacity: 1; }
  }

  /* ── Anneaux ── */
  .rings { position: absolute; width: 240px; height: 240px; pointer-events: none; }
  .ring {
    position: absolute; border-radius: 50%;
    border: 0.5px solid rgba(150,170,230,0.13);
    animation: ringOut 4s ease-out infinite;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
  }
  .ring:nth-child(1){ width:270px; height:270px; animation-delay:0s; }
  .ring:nth-child(2){ width:330px; height:330px; animation-delay:1.3s; }
  .ring:nth-child(3){ width:400px; height:400px; animation-delay:2.6s; }
  @keyframes ringOut {
    0%  { opacity:0; transform:translate(-50%,-50%) scale(0.9); }
    20% { opacity:1; }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(1.1); }
  }
  .menu-open .ring { animation-play-state: paused; opacity: 0; }

  /* ── Sphère wrapper ── */
  .sphere-wrap {
    position: relative;
    width: 200px; height: 200px;
    cursor: pointer;
    z-index: 20;
    transition: transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
    flex-shrink: 0;
  }
  .menu-open .sphere-wrap {
    transform: translateY(180px) scale(0.62);
  }
  canvas {
    display: block;
    width: 200px; height: 200px;
    border-radius: 50%;
    filter: drop-shadow(0 16px 38px rgba(80,100,200,0.13))
            drop-shadow(0 4px 10px rgba(100,130,220,0.08));
    transition: filter 0.3s;
  }
  .sphere-wrap:hover canvas {
    filter: drop-shadow(0 20px 48px rgba(80,100,200,0.22))
            drop-shadow(0 6px 16px rgba(100,130,220,0.14));
  }

  /* ── Status label ── */
  .status {
    position: absolute;
    bottom: 44px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 7px;
    font-size: 10.5px; letter-spacing: 0.2em;
    color: rgba(0,0,0,0.18);
    text-transform: uppercase; font-weight: 400;
    white-space: nowrap; user-select: none;
    transition: opacity 0.4s;
  }
  .menu-open .status { opacity: 0; pointer-events: none; }
  .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(80,200,140,0.65);
    animation: dotBlink 2.5s ease-in-out infinite;
  }
  @keyframes dotBlink {
    0%,100%{ opacity:1; } 50%{ opacity:0.2; }
  }

  /* ── Hint tap ── */
  .hint {
    position: absolute;
    bottom: 90px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px; color: rgba(0,0,0,0.14);
    letter-spacing: 0.1em;
    animation: hintFloat 3s ease-in-out infinite;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .menu-open .hint { opacity: 0; }
  @keyframes hintFloat {
    0%,100%{ transform:translateX(-50%) translateY(0); opacity:0.6; }
    50%    { transform:translateX(-50%) translateY(-4px); opacity:1; }
  }

  /* ══════════════════════════════════════
     MENU OVERLAY
  ══════════════════════════════════════ */
  .menu-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  .menu-open .menu-overlay { pointer-events: auto; }

  /* Courbe de fond décorative (comme sur la ref) */
  .menu-curve {
    position: absolute;
    right: -60px; top: 0; bottom: 0;
    width: 200px;
    opacity: 0;
    transition: opacity 0.4s 0.1s;
    pointer-events: none;
  }
  .menu-open .menu-curve { opacity: 1; }

  /* ── Items de menu ── */
  .menu-items {
    position: absolute;
    left: 0; right: 0;
    top: 50%; transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding-bottom: 180px; /* espace pour la sphère en bas */
  }

  .menu-item {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    width: 100%;
    padding: 0 64px 0 0;
    gap: 18px;
    opacity: 0;
    transform: translateX(30px);
    transition:
      opacity 0.38s ease,
      transform 0.38s cubic-bezier(0.34,1.2,0.64,1);
    cursor: pointer;
    user-select: none;
    position: relative;
    margin-bottom: 28px;
  }

  /* Stagger delay à l'ouverture */
  .menu-open .menu-item:nth-child(1){ opacity:1; transform:translateX(0); transition-delay:0.05s; }
  .menu-open .menu-item:nth-child(2){ opacity:1; transform:translateX(0); transition-delay:0.11s; }
  .menu-open .menu-item:nth-child(3){ opacity:1; transform:translateX(0); transition-delay:0.17s; }
  .menu-open .menu-item:nth-child(4){ opacity:1; transform:translateX(0); transition-delay:0.23s; }

  .item-label {
    font-size: 22px;
    font-weight: 300;
    color: rgba(0,0,0,0.25);
    letter-spacing: -0.01em;
    transition: color 0.3s;
  }
  .menu-item.active .item-label {
    color: rgba(0,0,0,0.75);
    font-weight: 400;
  }

  /* Icône bulle */
  .item-icon {
    width: 58px; height: 58px;
    border-radius: 50%;
    background: rgba(0,0,0,0.04);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    position: relative;
    transition: background 0.3s, transform 0.3s;
  }
  .menu-item:hover .item-icon { transform: scale(1.08); }

  /* Item actif — contour iridescent animé */
  .menu-item.active .item-icon {
    background: rgba(180,200,255,0.08);
  }
  .menu-item.active .item-icon::before {
    content: '';
    position: absolute;
    inset: -2.5px;
    border-radius: 50%;
    padding: 2.5px;
    background: conic-gradient(
      from var(--a, 0deg),
      hsl(270,70%,70%),
      hsl(200,80%,72%),
      hsl(160,75%,68%),
      hsl(50,85%,72%),
      hsl(310,65%,68%),
      hsl(270,70%,70%)
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: rotateBorder 3s linear infinite;
  }
  @property --a {
    syntax: '<angle>';
    inherits: false;
    initial-value: 0deg;
  }
  @keyframes rotateBorder {
    to { --a: 360deg; }
  }

  /* Pilule label actif */
  .menu-item.active .item-label-wrap {
    display: flex; align-items: center; gap: 10px;
  }
  .active-pill {
    display: none;
    width: 36px; height: 18px;
    border-radius: 20px;
    background: rgba(0,0,0,0.75);
    flex-shrink: 0;
  }
  .menu-item.active .active-pill { display: block; }

  /* Fermer (tap ailleurs) */
  .close-area {
    position: absolute;
    inset: 0;
    z-index: 1;
  }
  .menu-items { z-index: 2; }

</style>
</head>
<body>
<div class="app" id="app">

  <div class="glow"></div>

  <div class="rings">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>

  <!-- MENU OVERLAY -->
  <div class="menu-overlay" id="menuOverlay">
    <div class="close-area" id="closeArea"></div>

    <!-- Courbe décorative SVG -->
    <svg class="menu-curve" viewBox="0 0 200 800" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M160 0 Q60 400 160 800" stroke="rgba(0,0,0,0.06)" stroke-width="1" fill="none"/>
    </svg>

    <div class="menu-items" id="menuItems">

      <div class="menu-item" data-index="0">
        <div class="item-label-wrap">
          <span class="item-label">Habitudes</span>
          <div class="active-pill"></div>
        </div>
        <div class="item-icon">🌱</div>
      </div>

      <div class="menu-item" data-index="1">
        <div class="item-label-wrap">
          <span class="item-label">Sommeil</span>
          <div class="active-pill"></div>
        </div>
        <div class="item-icon">🌙</div>
      </div>

      <div class="menu-item" data-index="2">
        <div class="item-label-wrap">
          <span class="item-label">Sport</span>
          <div class="active-pill"></div>
        </div>
        <div class="item-icon">⚡</div>
      </div>

      <div class="menu-item" data-index="3">
        <div class="item-label-wrap">
          <span class="item-label">Réflexion</span>
          <div class="active-pill"></div>
        </div>
        <div class="item-icon">✦</div>
      </div>

    </div>
  </div>

  <!-- SPHERE -->
  <div class="sphere-wrap" id="wrap">
    <canvas id="c" width="480" height="480"></canvas>
  </div>

  <div class="hint">appuie pour explorer</div>
  <div class="status"><div class="dot"></div>Agent actif</div>

</div>

<script>
/* ══════════════════════════════════════
   SPHERE CANVAS
══════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 480, CX = W/2, CY = H/2, BASE_R = 182;

let t = 0;

const waves = [
  { freq:2, amp:7,  speed:0.28, phase:0.0 },
  { freq:3, amp:5,  speed:0.19, phase:1.1 },
  { freq:4, amp:4,  speed:0.35, phase:2.4 },
  { freq:5, amp:3,  speed:0.22, phase:0.7 },
  { freq:1, amp:6,  speed:0.14, phase:3.1 },
];

function getR(angle, time) {
  let r = BASE_R;
  for (const w of waves)
    r += Math.sin(angle * w.freq + w.phase + time * w.speed) * w.amp;
  return r;
}

function buildPath(time) {
  const steps = 256;
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const a = (i / steps) * Math.PI * 2;
    const r = getR(a, time);
    const x = CX + Math.cos(a) * r;
    const y = CY + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
}

function draw() {
  t += 0.008;
  ctx.clearRect(0,0,W,H);

  ctx.save();
  buildPath(t);
  ctx.clip();

  const hue = t * 18;

  /* base */
  const base = ctx.createRadialGradient(CX-30,CY-40,20,CX,CY,BASE_R+20);
  base.addColorStop(0.0, 'hsl(220,55%,90%)');
  base.addColorStop(0.35,'hsl(210,65%,82%)');
  base.addColorStop(0.65,'hsl(200,70%,70%)');
  base.addColorStop(1.0, 'hsl(230,60%,50%)');
  ctx.fillStyle = base; ctx.fillRect(0,0,W,H);

  /* iridescence 1 */
  const irid = ctx.createLinearGradient(
    CX+Math.cos(t*0.25)*140, CY+Math.sin(t*0.18)*100,
    CX-Math.cos(t*0.25)*140, CY-Math.sin(t*0.18)*100
  );
  irid.addColorStop(0.0,  `hsla(${270+hue},75%,65%,0.55)`);
  irid.addColorStop(0.2,  `hsla(${195+hue},85%,68%,0.50)`);
  irid.addColorStop(0.42, `hsla(${160+hue},70%,65%,0.40)`);
  irid.addColorStop(0.58, `hsla(${210+hue},80%,70%,0.45)`);
  irid.addColorStop(0.78, `hsla(${300+hue},65%,62%,0.50)`);
  irid.addColorStop(1.0,  `hsla(${50+hue}, 85%,68%,0.40)`);
  ctx.fillStyle = irid; ctx.fillRect(0,0,W,H);

  /* iridescence 2 */
  const irid2 = ctx.createLinearGradient(
    CX+Math.sin(t*0.3)*100, CY-Math.cos(t*0.22)*120,
    CX-Math.sin(t*0.3)*100, CY+Math.cos(t*0.22)*120
  );
  irid2.addColorStop(0.0, `hsla(${340+hue},80%,70%,0.30)`);
  irid2.addColorStop(0.5, `hsla(${175+hue},75%,65%,0.20)`);
  irid2.addColorStop(1.0, `hsla(${260+hue},70%,60%,0.28)`);
  ctx.fillStyle = irid2; ctx.fillRect(0,0,W,H);

  /* reflet principal */
  const spec = ctx.createRadialGradient(CX-65,CY-70,4,CX-50,CY-55,100);
  spec.addColorStop(0.0,'rgba(255,255,255,0.82)');
  spec.addColorStop(0.3,'rgba(240,245,255,0.45)');
  spec.addColorStop(0.7,'rgba(220,235,255,0.12)');
  spec.addColorStop(1.0,'rgba(255,255,255,0)');
  ctx.fillStyle = spec; ctx.fillRect(0,0,W,H);

  /* reflet secondaire */
  const spec2 = ctx.createRadialGradient(CX+70,CY+60,2,CX+65,CY+55,55);
  spec2.addColorStop(0.0,'rgba(255,255,255,0.30)');
  spec2.addColorStop(1.0,'rgba(255,255,255,0)');
  ctx.fillStyle = spec2; ctx.fillRect(0,0,W,H);

  /* bord sombre */
  const edge = ctx.createRadialGradient(CX,CY,BASE_R*0.50,CX,CY,BASE_R+25);
  edge.addColorStop(0.0,'rgba(0,0,0,0)');
  edge.addColorStop(0.6,'rgba(10,15,50,0.05)');
  edge.addColorStop(0.85,'rgba(10,10,60,0.20)');
  edge.addColorStop(1.0,'rgba(5,5,40,0.52)');
  ctx.fillStyle = edge; ctx.fillRect(0,0,W,H);

  /* tache huile */
  const oil = ctx.createRadialGradient(
    CX+Math.cos(t*0.4)*60, CY+Math.sin(t*0.55)*50, 5,
    CX+Math.cos(t*0.4)*60, CY+Math.sin(t*0.55)*50, 90
  );
  oil.addColorStop(0.0, `hsla(${40+hue},100%,72%,0.28)`);
  oil.addColorStop(0.5, `hsla(${170+hue},90%,65%,0.14)`);
  oil.addColorStop(1.0, 'rgba(0,0,0,0)');
  ctx.fillStyle = oil; ctx.fillRect(0,0,W,H);

  ctx.restore();

  buildPath(t);
  ctx.strokeStyle = 'rgba(150,170,220,0.18)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  requestAnimationFrame(draw);
}
draw();

/* ══════════════════════════════════════
   MENU LOGIC
══════════════════════════════════════ */
const app        = document.getElementById('app');
const wrap       = document.getElementById('wrap');
const closeArea  = document.getElementById('closeArea');
const items      = document.querySelectorAll('.menu-item');

let menuOpen = false;
let activeIndex = -1;

function openMenu() {
  if (menuOpen) return;
  menuOpen = true;
  app.classList.add('menu-open');
}

function closeMenu() {
  if (!menuOpen) return;
  menuOpen = false;
  app.classList.remove('menu-open');
}

wrap.addEventListener('click', () => {
  if (menuOpen) closeMenu();
  else openMenu();
});

closeArea.addEventListener('click', closeMenu);

items.forEach((item, i) => {
  item.addEventListener('click', (e) => {
    e.stopPropagation();
    items.forEach(it => it.classList.remove('active'));
    if (activeIndex === i) {
      activeIndex = -1;
    } else {
      activeIndex = i;
      item.classList.add('active');
    }
    setTimeout(closeMenu, 320);
  });
});

/* Touch / swipe down to close */
let touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 60 && menuOpen) closeMenu();
});
</script>
</body>
</html>
