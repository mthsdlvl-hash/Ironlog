<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#ebebeb;font-family:'DM Sans',sans-serif;overflow:hidden;}

  .app{
    width:100vw;height:100vh;
    background:#ffffff;
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
  }

  /* ── Lueur ambiante ── */
  .glow{
    position:absolute;width:340px;height:340px;border-radius:50%;
    background:radial-gradient(circle,rgba(160,180,255,0.08) 0%,transparent 70%);
    animation:glowPulse 5s ease-in-out infinite;pointer-events:none;
    transition:opacity 0.6s;
  }
  .menu-open .glow{opacity:0.2;}
  @keyframes glowPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}

  /* ── Anneaux ── */
  .rings{position:absolute;pointer-events:none;transition:opacity 0.4s;}
  .menu-open .rings{opacity:0;}
  .ring{
    position:absolute;border-radius:50%;
    border:0.5px solid rgba(150,170,230,0.13);
    animation:ringOut 4s ease-out infinite;
    top:50%;left:50%;transform:translate(-50%,-50%);
  }
  .ring:nth-child(1){width:250px;height:250px;animation-delay:0s;}
  .ring:nth-child(2){width:310px;height:310px;animation-delay:1.3s;}
  .ring:nth-child(3){width:380px;height:380px;animation-delay:2.6s;}
  @keyframes ringOut{
    0%{opacity:0;transform:translate(-50%,-50%) scale(0.9);}
    20%{opacity:1;}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1.1);}
  }

  /* ── Sphère ── */
  .sphere-wrap{
    position:absolute;
    left:50%;top:50%;
    transform:translate(-50%,-50%);
    width:190px;height:190px;
    cursor:pointer;z-index:20;
    transition:left 0.65s cubic-bezier(0.77,0,0.18,1),
               top 0.65s cubic-bezier(0.77,0,0.18,1),
               transform 0.65s cubic-bezier(0.77,0,0.18,1);
  }
  /* quand menu ouvert → sphère glisse à gauche */
  .menu-open .sphere-wrap{
    left:22%;top:50%;
    transform:translate(-50%,-50%) scale(0.78);
  }
  canvas{
    display:block;width:190px;height:190px;border-radius:50%;
    filter:drop-shadow(0 14px 34px rgba(80,100,200,0.14)) drop-shadow(0 3px 10px rgba(100,130,220,0.09));
  }

  /* ── Status ── */
  .status{
    position:absolute;bottom:40px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:7px;
    font-size:10px;letter-spacing:0.22em;color:rgba(0,0,0,0.18);
    text-transform:uppercase;white-space:nowrap;user-select:none;
    transition:opacity 0.4s;
  }
  .menu-open .status{opacity:0;pointer-events:none;}
  .dot{width:5px;height:5px;border-radius:50%;background:rgba(80,200,140,0.7);animation:blink 2.5s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.15;}}

  /* ── Hint ── */
  .hint{
    position:absolute;bottom:72px;left:50%;transform:translateX(-50%);
    font-size:10.5px;color:rgba(0,0,0,0.13);letter-spacing:0.1em;
    animation:hintFloat 3.5s ease-in-out infinite;pointer-events:none;
    transition:opacity 0.4s;
  }
  .menu-open .hint{opacity:0;}
  @keyframes hintFloat{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-5px);}}

  /* ══════════════════════════════════════
     ARC MENU
  ══════════════════════════════════════ */
  .arc-canvas{
    position:absolute;inset:0;
    width:100%;height:100%;
    pointer-events:none;
    z-index:9;
    opacity:0;transition:opacity 0.5s;
  }
  .menu-open .arc-canvas{opacity:1;}

  /* Items positionnés en JS */
  .menu-item{
    position:absolute;
    display:flex;align-items:center;gap:14px;
    cursor:pointer;
    opacity:0;
    transform:scale(0.85);
    transition:opacity 0.35s,transform 0.35s cubic-bezier(0.34,1.4,0.64,1);
    z-index:30;
    user-select:none;
    pointer-events:none;
  }
  .menu-open .menu-item{
    opacity:1;transform:scale(1);pointer-events:auto;
  }
  /* stagger */
  .menu-open .menu-item:nth-child(1){transition-delay:0.04s;}
  .menu-open .menu-item:nth-child(2){transition-delay:0.10s;}
  .menu-open .menu-item:nth-child(3){transition-delay:0.16s;}
  .menu-open .menu-item:nth-child(4){transition-delay:0.22s;}

  .item-label{
    font-size:19px;font-weight:300;
    color:rgba(0,0,0,0.22);
    letter-spacing:-0.01em;
    transition:color 0.25s,font-weight 0.25s;
    white-space:nowrap;
  }
  .menu-item.active .item-label,
  .menu-item.hovered .item-label{
    color:rgba(0,0,0,0.72);font-weight:400;
  }

  .item-icon{
    width:54px;height:54px;border-radius:50%;
    background:rgba(0,0,0,0.04);
    display:flex;align-items:center;justify-content:center;
    font-size:24px;flex-shrink:0;
    position:relative;
    transition:transform 0.3s,background 0.3s;
  }
  .menu-item.active .item-icon,
  .menu-item.hovered .item-icon{
    background:rgba(180,200,255,0.09);
    transform:scale(1.1);
  }

  /* Contour iridescent tournant sur l'item actif */
  .menu-item.active .item-icon::before{
    content:'';position:absolute;inset:-2.5px;border-radius:50%;
    background:conic-gradient(from 0deg,
      hsl(270,70%,70%),hsl(200,80%,72%),hsl(160,75%,68%),
      hsl(50,85%,72%),hsl(310,65%,68%),hsl(270,70%,70%)
    );
    -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
    mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    animation:spinBorder 2.5s linear infinite;
  }
  @keyframes spinBorder{to{transform:rotate(360deg);}}

  /* Pilule noire item actif */
  .active-pill{
    display:none;
    width:32px;height:16px;border-radius:20px;
    background:rgba(0,0,0,0.72);flex-shrink:0;
  }
  .menu-item.active .active-pill{display:block;}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="glow"></div>
  <div class="rings">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
  </div>

  <!-- Canvas pour l'arc + rayon lumineux -->
  <canvas class="arc-canvas" id="arcCanvas"></canvas>

  <!-- Items menu (positionnés dynamiquement) -->
  <div class="menu-item" data-index="0" id="item0">
    <span class="item-label">Habitudes</span>
    <div class="item-icon">🌱</div>
    <div class="active-pill"></div>
  </div>
  <div class="menu-item" data-index="1" id="item1">
    <span class="item-label">Sommeil</span>
    <div class="item-icon">🌙</div>
    <div class="active-pill"></div>
  </div>
  <div class="menu-item" data-index="2" id="item2">
    <span class="item-label">Sport</span>
    <div class="item-icon">⚡</div>
    <div class="active-pill"></div>
  </div>
  <div class="menu-item" data-index="3" id="item3">
    <span class="item-label">Réflexion</span>
    <div class="item-icon">✦</div>
    <div class="active-pill"></div>
  </div>

  <!-- Sphère -->
  <div class="sphere-wrap" id="wrap">
    <canvas id="c" width="480" height="480"></canvas>
  </div>

  <div class="hint">appuie pour explorer</div>
  <div class="status"><div class="dot"></div>Agent actif</div>
</div>

<script>
/* ══════════════════════════════════════
   SPHERE
══════════════════════════════════════ */
const SC = document.getElementById('c');
const sctx = SC.getContext('2d');
const SW=480,SH=480,SCX=SW/2,SCY=SH/2,SR=178;
let t=0;
const waves=[
  {freq:2,amp:7,speed:0.28,phase:0.0},
  {freq:3,amp:5,speed:0.19,phase:1.1},
  {freq:4,amp:4,speed:0.35,phase:2.4},
  {freq:5,amp:3,speed:0.22,phase:0.7},
  {freq:1,amp:6,speed:0.14,phase:3.1},
];
function getR(a,time){
  let r=SR;
  for(const w of waves) r+=Math.sin(a*w.freq+w.phase+time*w.speed)*w.amp;
  return r;
}
function buildSphere(time){
  const steps=256;
  sctx.beginPath();
  for(let i=0;i<=steps;i++){
    const a=(i/steps)*Math.PI*2;
    const r=getR(a,time);
    const x=SCX+Math.cos(a)*r,y=SCY+Math.sin(a)*r;
    i===0?sctx.moveTo(x,y):sctx.lineTo(x,y);
  }
  sctx.closePath();
}
function drawSphere(){
  t+=0.008;
  sctx.clearRect(0,0,SW,SH);
  sctx.save();
  buildSphere(t);sctx.clip();
  const hue=t*18;
  const base=sctx.createRadialGradient(SCX-30,SCY-40,20,SCX,SCY,SR+20);
  base.addColorStop(0.0,'hsl(220,55%,90%)');
  base.addColorStop(0.35,'hsl(210,65%,82%)');
  base.addColorStop(0.65,'hsl(200,70%,70%)');
  base.addColorStop(1.0,'hsl(230,60%,50%)');
  sctx.fillStyle=base;sctx.fillRect(0,0,SW,SH);
  const ir=sctx.createLinearGradient(SCX+Math.cos(t*0.25)*140,SCY+Math.sin(t*0.18)*100,SCX-Math.cos(t*0.25)*140,SCY-Math.sin(t*0.18)*100);
  ir.addColorStop(0.0,`hsla(${270+hue},75%,65%,0.55)`);
  ir.addColorStop(0.2,`hsla(${195+hue},85%,68%,0.50)`);
  ir.addColorStop(0.42,`hsla(${160+hue},70%,65%,0.40)`);
  ir.addColorStop(0.58,`hsla(${210+hue},80%,70%,0.45)`);
  ir.addColorStop(0.78,`hsla(${300+hue},65%,62%,0.50)`);
  ir.addColorStop(1.0,`hsla(${50+hue},85%,68%,0.40)`);
  sctx.fillStyle=ir;sctx.fillRect(0,0,SW,SH);
  const ir2=sctx.createLinearGradient(SCX+Math.sin(t*0.3)*100,SCY-Math.cos(t*0.22)*120,SCX-Math.sin(t*0.3)*100,SCY+Math.cos(t*0.22)*120);
  ir2.addColorStop(0.0,`hsla(${340+hue},80%,70%,0.30)`);
  ir2.addColorStop(0.5,`hsla(${175+hue},75%,65%,0.20)`);
  ir2.addColorStop(1.0,`hsla(${260+hue},70%,60%,0.28)`);
  sctx.fillStyle=ir2;sctx.fillRect(0,0,SW,SH);
  const sp=sctx.createRadialGradient(SCX-65,SCY-70,4,SCX-50,SCY-55,100);
  sp.addColorStop(0.0,'rgba(255,255,255,0.82)');
  sp.addColorStop(0.3,'rgba(240,245,255,0.45)');
  sp.addColorStop(0.7,'rgba(220,235,255,0.12)');
  sp.addColorStop(1.0,'rgba(255,255,255,0)');
  sctx.fillStyle=sp;sctx.fillRect(0,0,SW,SH);
  const sp2=sctx.createRadialGradient(SCX+70,SCY+60,2,SCX+65,SCY+55,55);
  sp2.addColorStop(0.0,'rgba(255,255,255,0.30)');
  sp2.addColorStop(1.0,'rgba(255,255,255,0)');
  sctx.fillStyle=sp2;sctx.fillRect(0,0,SW,SH);
  const ed=sctx.createRadialGradient(SCX,SCY,SR*0.5,SCX,SCY,SR+25);
  ed.addColorStop(0.0,'rgba(0,0,0,0)');
  ed.addColorStop(0.6,'rgba(10,15,50,0.05)');
  ed.addColorStop(0.85,'rgba(10,10,60,0.20)');
  ed.addColorStop(1.0,'rgba(5,5,40,0.52)');
  sctx.fillStyle=ed;sctx.fillRect(0,0,SW,SH);
  const oil=sctx.createRadialGradient(SCX+Math.cos(t*0.4)*60,SCY+Math.sin(t*0.55)*50,5,SCX+Math.cos(t*0.4)*60,SCY+Math.sin(t*0.55)*50,90);
  oil.addColorStop(0.0,`hsla(${40+hue},100%,72%,0.28)`);
  oil.addColorStop(0.5,`hsla(${170+hue},90%,65%,0.14)`);
  oil.addColorStop(1.0,'rgba(0,0,0,0)');
  sctx.fillStyle=oil;sctx.fillRect(0,0,SW,SH);
  sctx.restore();
  buildSphere(t);
  sctx.strokeStyle='rgba(150,170,220,0.18)';
  sctx.lineWidth=1.5;sctx.stroke();
  requestAnimationFrame(drawSphere);
}
drawSphere();

/* ══════════════════════════════════════
   ARC MENU
══════════════════════════════════════ */
const app      = document.getElementById('app');
const wrap     = document.getElementById('wrap');
const arcCv    = document.getElementById('arcCanvas');
const actx     = arcCv.getContext('2d');
const itemEls  = document.querySelectorAll('.menu-item');

let menuOpen   = false;
let activeIdx  = -1;
let hoveredIdx = -1;
let rayTarget  = -1;   // index vers lequel le rayon se dirige
let rayProgress= 0;    // 0→1 animation du rayon
let rayActive  = false;
let pulseT     = 0;

// Positions arc (calculées en fonction de la taille écran)
const ITEMS = [
  { label:'Habitudes', emoji:'🌱' },
  { label:'Sommeil',   emoji:'🌙' },
  { label:'Sport',     emoji:'⚡' },
  { label:'Réflexion', emoji:'✦' },
];

// Paramètres de l'arc : rayon et angles
// La sphère est à gauche (~22% du viewport width)
// L'arc part de la sphère et va vers la droite

function resize(){
  arcCv.width  = window.innerWidth;
  arcCv.height = window.innerHeight;
  positionItems();
}

function getSphereCenter(){
  if(!menuOpen){
    return { x: window.innerWidth/2, y: window.innerHeight/2 };
  }
  // sphère ouverte : 22% left, 50% top
  return { x: window.innerWidth * 0.22, y: window.innerHeight * 0.50 };
}

// Arc : les options sont réparties sur un arc de cercle
// dont le centre est approximativement la sphère
const ARC_R      = Math.min(window.innerWidth, window.innerHeight) * 0.44;
const ARC_START  = -52 * Math.PI/180;  // angle du premier item (depuis sphère)
const ARC_END    =  52 * Math.PI/180;  // angle du dernier item

function getItemAngle(i){
  const n = ITEMS.length;
  return ARC_START + (ARC_END - ARC_START) * (i / (n-1));
}

function positionItems(){
  const sc = getSphereCenter();
  const arcR = Math.min(window.innerWidth, window.innerHeight) * 0.42;
  itemEls.forEach((el, i)=>{
    const angle  = getItemAngle(i);
    // Centre de l'icône sur l'arc
    const ix = sc.x + Math.cos(angle) * arcR;
    const iy = sc.y + Math.sin(angle) * arcR;
    // L'item s'aligne : icône à droite, label à sa gauche
    const iconW = 54, labelW = 130;
    const totalW = labelW + 14 + iconW;
    // On positionne l'item centré sur le point de l'arc
    el.style.left = (ix - iconW/2 - labelW - 14) + 'px';
    el.style.top  = (iy - 27) + 'px';
    el.style.width = totalW + 'px';
  });
}

/* Rayon lumineux projeté de la sphère vers l'item */
function drawRay(sc, targetEl, progress, hue){
  if(!targetEl) return;
  const rect = targetEl.getBoundingClientRect();
  // Point d'arrivée = centre de l'icône
  const iconEl = targetEl.querySelector('.item-icon');
  const ir = iconEl.getBoundingClientRect();
  const tx = ir.left + ir.width/2;
  const ty = ir.top  + ir.height/2;

  const dx = tx - sc.x, dy = ty - sc.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  // Rayon de la sphère affichée (px réels)
  const sphereR = 190/2 * 0.78; // taille*scale

  // Point de départ sur la surface de la sphère
  const nx = dx/dist, ny = dy/dist;
  const sx = sc.x + nx * sphereR;
  const sy = sc.y + ny * sphereR;

  // Point d'arrivée animé
  const ex = sx + dx * progress;
  const ey = sy + dy * progress;

  actx.save();
  const grad = actx.createLinearGradient(sx, sy, ex, ey);
  grad.addColorStop(0.0, `hsla(${270+hue},80%,75%,0.0)`);
  grad.addColorStop(0.15,`hsla(${270+hue},80%,75%,0.55)`);
  grad.addColorStop(0.6, `hsla(${200+hue},85%,72%,0.40)`);
  grad.addColorStop(0.85,`hsla(${160+hue},80%,70%,0.55)`);
  grad.addColorStop(1.0, `hsla(${160+hue},80%,70%,0.0)`);

  actx.beginPath();
  actx.moveTo(sx, sy);
  actx.lineTo(ex, ey);
  actx.strokeStyle = grad;
  actx.lineWidth = 1.2;
  actx.shadowColor = `hsla(${200+hue},90%,72%,0.4)`;
  actx.shadowBlur = 6;
  actx.stroke();

  // Petite lueur au bout du rayon
  if(progress > 0.85){
    const alpha = (progress - 0.85) / 0.15;
    const glow = actx.createRadialGradient(ex,ey,0,ex,ey,18);
    glow.addColorStop(0, `hsla(${220+hue},90%,80%,${0.35*alpha})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    actx.fillStyle = glow;
    actx.beginPath();
    actx.arc(ex,ey,18,0,Math.PI*2);
    actx.fill();
  }
  actx.restore();
}

/* Arc décoratif en pointillés fins */
function drawArcLine(sc){
  const arcR = Math.min(window.innerWidth, window.innerHeight) * 0.42;
  actx.save();
  actx.beginPath();
  actx.arc(sc.x, sc.y, arcR, ARC_START - 0.08, ARC_END + 0.08);
  actx.strokeStyle = 'rgba(0,0,0,0.055)';
  actx.lineWidth = 0.8;
  actx.setLineDash([3,8]);
  actx.stroke();
  actx.setLineDash([]);
  actx.restore();
}

/* Loop de rendu du canvas arc */
function arcLoop(){
  requestAnimationFrame(arcLoop);
  if(!menuOpen){ actx.clearRect(0,0,arcCv.width,arcCv.height); return; }

  actx.clearRect(0,0,arcCv.width,arcCv.height);
  pulseT += 0.04;

  const sc = getSphereCenter();
  const hue = t * 18; // sync avec la sphère

  drawArcLine(sc);

  // Rayon vers item hovered ou actif
  const targetIdx = hoveredIdx >= 0 ? hoveredIdx : activeIdx;
  if(targetIdx >= 0){
    if(rayTarget !== targetIdx){
      rayTarget   = targetIdx;
      rayProgress = 0;
      rayActive   = true;
    }
    if(rayActive && rayProgress < 1) rayProgress = Math.min(1, rayProgress + 0.06);
    drawRay(sc, itemEls[rayTarget], rayProgress, hue);
  } else {
    rayTarget   = -1;
    rayProgress = 0;
    rayActive   = false;
  }
}
arcLoop();

/* ── Interactions ── */
function openMenu(){
  if(menuOpen) return;
  menuOpen = true;
  app.classList.add('menu-open');
  setTimeout(positionItems, 50);
}
function closeMenu(){
  if(!menuOpen) return;
  menuOpen = false;
  hoveredIdx = -1;
  app.classList.remove('menu-open');
}

wrap.addEventListener('click', ()=>{ menuOpen ? closeMenu() : openMenu(); });

itemEls.forEach((el, i)=>{
  el.addEventListener('mouseenter', ()=>{ hoveredIdx = i; el.classList.add('hovered'); });
  el.addEventListener('mouseleave', ()=>{ hoveredIdx = -1; el.classList.remove('hovered'); });
  el.addEventListener('click', (e)=>{
    e.stopPropagation();
    itemEls.forEach(it=>it.classList.remove('active'));
    activeIdx = (activeIdx === i) ? -1 : i;
    if(activeIdx >= 0) el.classList.add('active');
    setTimeout(closeMenu, 400);
  });
  // Touch
  el.addEventListener('touchstart', ()=>{ hoveredIdx = i; }, {passive:true});
  el.addEventListener('touchend', (e)=>{
    e.stopPropagation();
    itemEls.forEach(it=>it.classList.remove('active'));
    activeIdx = (activeIdx === i) ? -1 : i;
    if(activeIdx >= 0) el.classList.add('active');
    hoveredIdx = -1;
    setTimeout(closeMenu, 400);
  });
});

// Clic en dehors = fermer
app.addEventListener('click', (e)=>{
  if(menuOpen && !wrap.contains(e.target) && ![...itemEls].some(el=>el.contains(e.target))){
    closeMenu();
  }
});

window.addEventListener('resize', ()=>{ resize(); positionItems(); });
resize();
</script>
</body>
</html>
